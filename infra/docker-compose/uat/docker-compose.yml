name: kpm-uat

x-backend-environment: &backend-environment
  KPM_DB_HOST: postgres
  KPM_DB_PORT: 5432
  KPM_VALKEY_HOST: valkey
  KPM_VALKEY_PORT: 6379
  KPM_NACOS_ADDR: nacos:8848
  KPM_NACOS_ENABLED: ${KPM_NACOS_ENABLED:-true}
  KPM_NACOS_CONFIG_ENABLED: ${KPM_NACOS_CONFIG_ENABLED:-true}
  KPM_NACOS_NAMESPACE: ${KPM_NACOS_NAMESPACE:-public}
  KPM_NACOS_CONFIG_GROUP: ${KPM_NACOS_CONFIG_GROUP:-DEFAULT_GROUP}
  KPM_AUTH_ENABLED: ${KPM_AUTH_ENABLED:-true}
  KPM_RBAC_ENABLED: ${KPM_RBAC_ENABLED:-true}
  KPM_AUTH_TOKEN_SECRET: ${KPM_AUTH_TOKEN_SECRET:-kpm-local-dev-secret-change-me}
  KPM_LOG_PATH: ${KPM_LOG_PATH:-/app/logs}
  JAVA_TOOL_OPTIONS: ${KPM_JAVA_TOOL_OPTIONS:--Xms128m -Xmx512m -XX:+UseG1GC -Duser.timezone=Asia/Shanghai} ${KPM_SKYWALKING_JAVA_AGENT_OPTIONS:-}
  KPM_SKYWALKING_COLLECTOR_BACKEND_SERVICES: ${KPM_SKYWALKING_COLLECTOR_BACKEND_SERVICES:-skywalking-oap:11800}
  SW_AGENT_COLLECTOR_BACKEND_SERVICES: ${KPM_SKYWALKING_COLLECTOR_BACKEND_SERVICES:-skywalking-oap:11800}

x-backend-env: &backend-env
  env_file:
    - ../../../.env
  restart: unless-stopped
  environment: *backend-environment
  volumes:
    - kpm-backend-logs:/app/logs
    - kpm-skywalking-agent:/skywalking-agent:ro
  depends_on:
    postgres:
      condition: service_healthy
    valkey:
      condition: service_healthy
    nacos-config-publisher:
      condition: service_completed_successfully

services:
  postgres:
    image: postgres:18
    container_name: kpm-uat-postgres
    env_file:
      - ../../../.env
    environment:
      POSTGRES_DB: ${KPM_DB_NAME:-kpm}
      POSTGRES_USER: ${KPM_DB_USER:-kpm}
      POSTGRES_PASSWORD: ${KPM_DB_PASSWORD:-kpm_dev_password}
      TZ: ${KPM_TIMEZONE:-Asia/Shanghai}
    command: postgres -c timezone=${KPM_DB_TIMEZONE:-Asia/Shanghai}
    ports:
      - "${KPM_DB_PORT:-15433}:5432"
    volumes:
      - kpm-postgres-data:/var/lib/postgresql
      - ../../../infra/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../../infra/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KPM_DB_USER:-kpm} -d ${KPM_DB_NAME:-kpm}"]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    container_name: kpm-uat-valkey
    restart: unless-stopped
    ports:
      - "${KPM_VALKEY_PORT:-16380}:6379"
    volumes:
      - kpm-valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:v3.1.1
    container_name: kpm-uat-nacos
    restart: unless-stopped
    env_file:
      - ../../../.env
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: "S1BNLVVBVC1OYWNvcy1BdXRoLVRva2VuLTEyMzQ1Njc4OTA="
      NACOS_AUTH_IDENTITY_KEY: "kpm-uat"
      NACOS_AUTH_IDENTITY_VALUE: "kpm-uat"
      JVM_XMS: ${KPM_NACOS_JVM_XMS:-128m}
      JVM_XMX: ${KPM_NACOS_JVM_XMX:-512m}
      JVM_XMN: ${KPM_NACOS_JVM_XMN:-64m}
      JAVA_OPT_EXT: ${KPM_NACOS_JAVA_OPT_EXT:--Xms128m -Xmx512m -Xmn64m -XX:+UseG1GC}
    ports:
      - "${KPM_NACOS_PORT:-18848}:8848"
      - "${KPM_NACOS_CONSOLE_PORT:-18849}:8080"
      - "${KPM_NACOS_GRPC_PORT:-19848}:9848"
    volumes:
      - kpm-nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/v3/admin/core/state || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  nacos-config-publisher:
    image: alpine:3.22
    container_name: kpm-uat-nacos-config-publisher
    env_file:
      - ../../../.env
    environment:
      KPM_NACOS_ADDR: nacos:8848
      KPM_DB_HOST: postgres
      KPM_DB_PORT: 5432
      KPM_DB_NAME: ${KPM_DB_NAME:-kpm}
      KPM_DB_USER: ${KPM_DB_USER:-kpm}
      KPM_DB_PASSWORD: ${KPM_DB_PASSWORD:-kpm_dev_password}
      KPM_VALKEY_HOST: valkey
      KPM_VALKEY_PORT: 6379
      KPM_AUTH_TOKEN_SECRET: ${KPM_AUTH_TOKEN_SECRET:-kpm-local-dev-secret-change-me}
      KPM_IAM_URI: http://iam-service:8101
    volumes:
      - ../../../:/workspace
    working_dir: /workspace
    depends_on:
      nacos:
        condition: service_healthy
    command: sh -lc "apk add --no-cache bash curl >/dev/null && bash scripts/nacos-publish-service-configs.sh"

  iam-service:
    <<: *backend-env
    image: ${KPM_IMAGE_REGISTRY:-ghcr.io/kozensupport}/kpm-iam-service:${KPM_IMAGE_TAG:-latest}
    container_name: kpm-uat-iam-service
    environment:
      <<: *backend-environment
      KPM_SERVICE_NAME: kpm-iam-service
    ports:
      - "${KPM_IAM_PORT:-19101}:8101"

  resource-service:
    <<: *backend-env
    image: ${KPM_IMAGE_REGISTRY:-ghcr.io/kozensupport}/kpm-resource-service:${KPM_IMAGE_TAG:-latest}
    container_name: kpm-uat-resource-service
    environment:
      <<: *backend-environment
      KPM_SERVICE_NAME: kpm-resource-service
    ports:
      - "${KPM_RESOURCE_PORT:-19102}:8102"

  project-service:
    <<: *backend-env
    image: ${KPM_IMAGE_REGISTRY:-ghcr.io/kozensupport}/kpm-project-service:${KPM_IMAGE_TAG:-latest}
    container_name: kpm-uat-project-service
    environment:
      <<: *backend-environment
      KPM_SERVICE_NAME: kpm-project-service
    ports:
      - "${KPM_PROJECT_PORT:-19103}:8103"

  customer-service:
    <<: *backend-env
    image: ${KPM_IMAGE_REGISTRY:-ghcr.io/kozensupport}/kpm-customer-service:${KPM_IMAGE_TAG:-latest}
    container_name: kpm-uat-customer-service
    environment:
      <<: *backend-environment
      KPM_SERVICE_NAME: kpm-customer-service
    ports:
      - "${KPM_CUSTOMER_PORT:-19104}:8104"

  task-service:
    <<: *backend-env
    image: ${KPM_IMAGE_REGISTRY:-ghcr.io/kozensupport}/kpm-task-service:${KPM_IMAGE_TAG:-latest}
    container_name: kpm-uat-task-service
    environment:
      <<: *backend-environment
      KPM_SERVICE_NAME: kpm-task-service
    ports:
      - "${KPM_TASK_PORT:-19105}:8105"

  order-service:
    <<: *backend-env
    image: ${KPM_IMAGE_REGISTRY:-ghcr.io/kozensupport}/kpm-order-service:${KPM_IMAGE_TAG:-latest}
    container_name: kpm-uat-order-service
    environment:
      <<: *backend-environment
      KPM_SERVICE_NAME: kpm-order-service
    ports:
      - "${KPM_ORDER_PORT:-19106}:8106"

  file-service:
    <<: *backend-env
    image: ${KPM_IMAGE_REGISTRY:-ghcr.io/kozensupport}/kpm-file-service:${KPM_IMAGE_TAG:-latest}
    container_name: kpm-uat-file-service
    environment:
      <<: *backend-environment
      KPM_SERVICE_NAME: kpm-file-service
      KPM_UPLOAD_MAX_FILE_SIZE: ${KPM_UPLOAD_MAX_FILE_SIZE:-500MB}
      KPM_UPLOAD_MAX_REQUEST_SIZE: ${KPM_UPLOAD_MAX_REQUEST_SIZE:-520MB}
    ports:
      - "${KPM_FILE_PORT:-19107}:8107"

  analytics-service:
    <<: *backend-env
    image: ${KPM_IMAGE_REGISTRY:-ghcr.io/kozensupport}/kpm-analytics-service:${KPM_IMAGE_TAG:-latest}
    container_name: kpm-uat-analytics-service
    environment:
      <<: *backend-environment
      KPM_SERVICE_NAME: kpm-analytics-service
    ports:
      - "${KPM_ANALYTICS_PORT:-19108}:8108"

  integration-service:
    <<: *backend-env
    image: ${KPM_IMAGE_REGISTRY:-ghcr.io/kozensupport}/kpm-integration-service:${KPM_IMAGE_TAG:-latest}
    container_name: kpm-uat-integration-service
    environment:
      <<: *backend-environment
      KPM_SERVICE_NAME: kpm-integration-service
    ports:
      - "${KPM_INTEGRATION_PORT:-19109}:8109"

  notification-service:
    <<: *backend-env
    image: ${KPM_IMAGE_REGISTRY:-ghcr.io/kozensupport}/kpm-notification-service:${KPM_IMAGE_TAG:-latest}
    container_name: kpm-uat-notification-service
    environment:
      <<: *backend-environment
      KPM_SERVICE_NAME: kpm-notification-service
      KPM_NOTIFICATION_REFRESH_INTERVAL_SECONDS: ${KPM_NOTIFICATION_REFRESH_INTERVAL_SECONDS:-120}
      KPM_NOTIFICATION_PROCESSOR_INTERVAL_MS: ${KPM_NOTIFICATION_PROCESSOR_INTERVAL_MS:-15000}
      KPM_NOTIFICATION_MAIL_ENABLED: ${KPM_NOTIFICATION_MAIL_ENABLED:-false}
      KPM_NOTIFICATION_MAIL_FROM: ${KPM_NOTIFICATION_MAIL_FROM:-noreply@kozen.example}
    ports:
      - "${KPM_NOTIFICATION_PORT:-19110}:8110"

  gateway:
    <<: *backend-env
    image: ${KPM_IMAGE_REGISTRY:-ghcr.io/kozensupport}/kpm-gateway:${KPM_IMAGE_TAG:-latest}
    container_name: kpm-uat-gateway
    environment:
      <<: *backend-environment
      KPM_SERVICE_NAME: kpm-gateway
      KPM_IAM_URI: http://iam-service:8101
    ports:
      - "${KPM_GATEWAY_PORT:-19080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      nacos-config-publisher:
        condition: service_completed_successfully
      iam-service:
        condition: service_started
      resource-service:
        condition: service_started
      project-service:
        condition: service_started
      customer-service:
        condition: service_started
      task-service:
        condition: service_started
      order-service:
        condition: service_started
      file-service:
        condition: service_started
      analytics-service:
        condition: service_started
      integration-service:
        condition: service_started
      notification-service:
        condition: service_started

  frontend:
    image: ${KPM_IMAGE_REGISTRY:-ghcr.io/kozensupport}/kpm-frontend:${KPM_IMAGE_TAG:-latest}
    container_name: kpm-uat-frontend
    restart: unless-stopped
    ports:
      - "${KPM_FRONTEND_PORT:-14173}:80"
    depends_on:
      gateway:
        condition: service_started

  skywalking-agent-init:
    image: apache/skywalking-java-agent:9.4.0-java17
    container_name: kpm-uat-skywalking-agent-init
    profiles: ["observability"]
    volumes:
      - kpm-skywalking-agent:/agent
    command: sh -lc "rm -rf /agent/* && cp -r /skywalking/agent/* /agent/"

  skywalking-oap:
    image: apache/skywalking-oap-server:10.2.0
    container_name: kpm-uat-skywalking-oap
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      SW_HEALTH_CHECKER: default
      SW_TELEMETRY: prometheus
    ports:
      - "${KPM_SKYWALKING_GRPC_PORT:-11800}:11800"
      - "${KPM_SKYWALKING_HTTP_PORT:-12800}:12800"

  skywalking-ui:
    image: apache/skywalking-ui:10.2.0
    container_name: kpm-uat-skywalking-ui
    profiles: ["observability"]
    restart: unless-stopped
    depends_on:
      - skywalking-oap
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    ports:
      - "${KPM_SKYWALKING_UI_PORT:-19081}:8080"

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: kpm-uat-rocketmq-namesrv
    profiles: ["mq"]
    restart: unless-stopped
    command: sh mqnamesrv
    ports:
      - "${KPM_ROCKETMQ_NAMESRV_PORT:-9876}:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: kpm-uat-rocketmq-broker
    profiles: ["mq"]
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    command: sh mqbroker -n rocketmq-namesrv:9876
    ports:
      - "${KPM_ROCKETMQ_BROKER_PORT:-10911}:10911"
      - "${KPM_ROCKETMQ_BROKER_VIP_PORT:-10909}:10909"

volumes:
  kpm-postgres-data:
  kpm-valkey-data:
  kpm-nacos-data:
  kpm-backend-logs:
  kpm-skywalking-agent:
