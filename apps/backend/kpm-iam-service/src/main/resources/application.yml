server:
  port: 8101

spring:
  application:
    name: kpm-iam-service
  config:
    import: optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension:yaml}
  datasource:
    url: jdbc:postgresql://${KPM_DB_HOST:127.0.0.1}:${KPM_DB_PORT:5432}/${KPM_DB_NAME:kpm}?stringtype=unspecified&options=-c%20TimeZone%3D${KPM_DB_TIMEZONE:Asia/Shanghai}
    username: ${KPM_DB_USER:kpm}
    password: ${KPM_DB_PASSWORD:kpm_dev_password}
    hikari:
      maximum-pool-size: ${KPM_DB_POOL_MAX_SIZE:5}
      minimum-idle: ${KPM_DB_POOL_MIN_IDLE:1}
      connection-init-sql: SET TIME ZONE '${KPM_DB_TIMEZONE:Asia/Shanghai}'
  data:
    redis:
      host: ${KPM_VALKEY_HOST:127.0.0.1}
      port: ${KPM_VALKEY_PORT:6379}
  mail:
    host: ${KPM_MAIL_HOST:}
    port: ${KPM_MAIL_PORT:587}
    username: ${KPM_MAIL_USERNAME:}
    password: ${KPM_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${KPM_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${KPM_MAIL_STARTTLS_ENABLE:true}
  cloud:
    nacos:
      server-addr: ${KPM_NACOS_ADDR:127.0.0.1:8848}
      config:
        enabled: ${KPM_NACOS_CONFIG_ENABLED:${KPM_NACOS_ENABLED:false}}
        namespace: ${KPM_NACOS_NAMESPACE:public}
        group: ${KPM_NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        file-extension: yaml
      discovery:
        enabled: ${KPM_NACOS_ENABLED:false}
        namespace: ${KPM_NACOS_NAMESPACE:public}

management:
  health:
    mail:
      enabled: ${KPM_IAM_MAIL_HEALTH_ENABLED:${KPM_IAM_MAIL_ENABLED:false}}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

kpm:
  service:
    code: iam
  iam:
    password-code-ttl-seconds: ${KPM_IAM_PASSWORD_CODE_TTL_SECONDS:600}
    otp-debug-enabled: ${KPM_IAM_OTP_DEBUG_ENABLED:true}
    mail-enabled: ${KPM_IAM_MAIL_ENABLED:false}
    mail-from: ${KPM_IAM_MAIL_FROM:noreply@kozen.example}
