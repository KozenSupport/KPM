server:
  port: 8107

spring:
  application:
    name: kpm-file-service
  config:
    import: optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension:yaml}
  servlet:
    multipart:
      max-file-size: ${KPM_UPLOAD_MAX_FILE_SIZE:200MB}
      max-request-size: ${KPM_UPLOAD_MAX_REQUEST_SIZE:500MB}
  cloud:
    nacos:
      server-addr: ${KPM_NACOS_ADDR:127.0.0.1:8848}
      config:
        enabled: ${KPM_NACOS_CONFIG_ENABLED:${KPM_NACOS_ENABLED:false}}
        namespace: ${KPM_NACOS_NAMESPACE:public}
        group: ${KPM_NACOS_CONFIG_GROUP:DEFAULT_GROUP}
        file-extension: yaml
      discovery:
        enabled: ${KPM_NACOS_ENABLED:false}
        namespace: ${KPM_NACOS_NAMESPACE:public}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

kpm:
  service:
    code: file
