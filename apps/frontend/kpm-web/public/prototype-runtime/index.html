<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPM Kozen Project Management</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <section id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="watchers" aria-hidden="true">
        <div class="watcher"><span class="eye"></span><span class="eye"></span><i></i><b></b></div>
        <div class="watcher"><span class="eye"></span><span class="eye"></span><i></i><b></b></div>
        <div class="watcher"><span class="eye"></span><span class="eye"></span><i></i><b></b></div>
        <div class="watcher"><span class="eye"></span><span class="eye"></span><i></i><b></b></div>
      </div>
      <button id="login-language-toggle" class="login-language-toggle" type="button" data-i18n="language">中文 / EN</button>
      <div class="login-brand">
        <strong>KPM</strong>
        <span data-i18n="brand.subtitle">Kozen Project Management</span>
      </div>
      <form id="login-form" class="login-form">
        <label>
          <span data-i18n="login.account">账号</span>
          <input id="login-account" class="text-input" autocomplete="username" maxlength="64" value="zhangmin" data-i18n-placeholder="login.accountPlaceholder" placeholder="请输入账号" />
        </label>
        <label>
          <span data-i18n="login.password">密码</span>
          <input id="login-password" class="text-input" type="password" autocomplete="current-password" maxlength="128" data-i18n-placeholder="login.passwordPlaceholder" placeholder="请输入密码" />
        </label>
        <p id="login-error" class="login-error"></p>
        <button class="primary-btn" type="submit" data-i18n="login.button">登录</button>
      </form>
      <p class="login-hint" data-i18n="login.hint">演示账号：zhangmin / 123456</p>
    </div>
  </section>

  <div id="app-shell" class="app-shell hidden">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">K</div>
        <div>
          <strong>KPM</strong>
          <span data-i18n="brand.subtitle">Kozen Project Management</span>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-view="dashboard" data-i18n="menu.dashboard">工作台</button>
        <button class="nav-item" data-view="projects" data-i18n="menu.projects">项目管理</button>
        <button class="nav-item" data-view="customer-master" data-i18n="menu.customer-master">客户管理</button>
        <button class="nav-item" data-view="tasks" data-i18n="menu.tasks">任务管理</button>
        <button class="nav-item" data-view="orders" data-i18n="menu.orders">订单管理</button>
        <button class="nav-item" data-view="analytics" data-i18n="menu.analytics">统计看板</button>
        <button class="nav-item" data-view="templates" data-i18n="menu.templates">流程模板</button>
        <button class="nav-item" data-view="resources" data-i18n="menu.resources">资源管理</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="page-title">工作台</h1>
          <p id="page-subtitle">查看你参与的项目和当前进度</p>
        </div>
        <div class="topbar-actions">
          <div class="notification-menu">
            <button id="notification-trigger" class="notification-chip" type="button">
              <span data-i18n="notification.title">消息</span>
              <strong id="notification-count">0</strong>
            </button>
            <div id="notification-dropdown" class="notification-dropdown">
              <div class="notification-dropdown-head">
                <strong data-i18n="notification.internal">内部消息</strong>
                <small id="notification-refresh-note">2 min</small>
              </div>
              <div id="notification-list" class="notification-list"><p class="empty-note">暂无未读消息</p></div>
            </div>
          </div>
          <button id="language-toggle" class="ghost-btn">中文 / EN</button>
          <div class="user-menu">
            <button id="user-menu-trigger" class="user-chip">
              <span>张敏</span>
              <small>系统管理员</small>
            </button>
            <div id="user-dropdown" class="user-dropdown">
              <button data-action="open-change-password" data-i18n="user.changePassword">修改密码</button>
              <button data-action="logout" data-i18n="user.logout">退出登录</button>
            </div>
          </div>
        </div>
      </header>

      <section id="dashboard-view" class="view active">
        <div class="summary-grid">
          <article class="summary-card">
            <span>进行中项目</span>
            <strong>12</strong>
          </article>
          <article class="summary-card">
            <span>我参与的项目</span>
            <strong>5</strong>
          </article>
          <article class="summary-card">
            <span>本周更新</span>
            <strong>8</strong>
          </article>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <h2>我的项目</h2>
              <p>优先查看你参与的产品型号</p>
            </div>
            <button class="ghost-btn" data-view="projects">查看全部</button>
          </div>
          <div id="my-projects" class="project-list"></div>
        </div>
      </section>

      <section id="projects-view" class="view">
        <div class="toolbar">
          <input id="project-search" type="search" placeholder="搜索对外名称 / 内部名称 / Model 名称" />
          <select id="salesability-filter" class="select-input compact-filter">
            <option>全部销售状态</option>
            <option>可销售</option>
            <option>不可销售</option>
          </select>
          <select id="archive-filter" class="select-input compact-filter">
            <option>全部归档状态</option>
            <option>未归档</option>
            <option>已归档</option>
          </select>
          <button class="primary-btn" data-action="open-create" data-i18n="button.newProject">新建项目</button>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <h2>项目列表</h2>
              <p>按产品型号统一查看项目状态</p>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>对外名称</th>
                  <th>内部名称</th>
                  <th>Model 名称</th>
                  <th>进行中阶段</th>
                  <th>项目负责人</th>
                  <th>销售状态</th>
                  <th>状态</th>
                  <th>归档状态</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="project-table"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="tasks-view" class="view">
        <div id="task-management"></div>
      </section>

      <section id="customer-master-view" class="view">
        <div id="customer-management"></div>
      </section>

      <section id="orders-view" class="view">
        <div id="order-management"></div>
      </section>

      <section id="analytics-view" class="view">
        <div class="tabs analytics-tabs">
          <button class="tab active" data-analytics-tab="orders" data-i18n="analytics.orders">订单统计</button>
          <button class="tab" data-analytics-tab="resources" data-i18n="analytics.resources">资源分配情况</button>
          <button class="tab" data-analytics-tab="support" data-i18n="analytics.support">技术支持情况</button>
          <button class="tab" data-analytics-tab="activity" data-i18n="analytics.activity">客户活跃度</button>
        </div>
        <div id="analytics-content"></div>
      </section>

      <section id="task-detail-view" class="view">
        <button class="back-link" data-action="back-from-task-detail">← 返回任务来源</button>
        <div id="task-detail"></div>
      </section>

      <section id="project-detail-view" class="view">
        <button class="back-link" data-view="projects">← 返回项目列表</button>
        <div id="project-detail"></div>
      </section>

      <section id="project-edit-view" class="view">
        <button class="back-link" data-view="projects">← 返回项目列表</button>
        <div id="project-edit"></div>
      </section>

      <section id="stage-detail-view" class="view">
        <button class="back-link" data-view="project-detail">← 返回项目详情</button>
        <div id="stage-detail"></div>
      </section>

      <section id="customers-view" class="view">
        <button class="back-link" data-view="project-detail">← 返回项目详情</button>
        <div id="customer-placeholder"></div>
      </section>

      <section id="customer-detail-view" class="view">
        <button class="back-link" data-view="customer-master">← 返回客户管理</button>
        <div id="customer-detail"></div>
      </section>

      <section id="requirements-view" class="view">
        <button class="back-link" data-view="customers">← 返回客户列表</button>
        <div id="customer-requirements"></div>
      </section>

      <section id="requirement-overview-view" class="view">
        <button class="back-link" data-view="project-detail">← 返回项目详情</button>
        <div id="requirement-overview"></div>
      </section>

      <section id="materials-view" class="view">
        <button class="back-link" data-view="project-detail">← 返回项目详情</button>
        <div id="project-materials"></div>
      </section>

      <section id="create-project-view" class="view">
        <button class="back-link" data-view="projects">← 返回项目列表</button>
        <div class="wizard-shell">
          <div class="wizard-steps">
            <button class="wizard-step active" data-step="1">1 基本信息</button>
            <button class="wizard-step" data-step="2">2 流程模板</button>
            <button class="wizard-step" data-step="3">3 项目成员</button>
            <button class="wizard-step" data-step="4">4 阶段负责人</button>
          </div>
          <div id="wizard-content"></div>
        </div>
      </section>

      <section id="templates-view" class="view">
        <div class="toolbar template-toolbar">
          <input id="template-search" class="text-input compact-filter" type="search" placeholder="搜索模板名称 / 适用范围" />
          <select id="template-status-filter" class="select-input compact-filter">
            <option>全部状态</option>
            <option>启用</option>
            <option>草稿</option>
            <option>停用</option>
          </select>
          <button class="primary-btn" data-action="open-template-create">新建模板</button>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2>流程模板</h2>
              <p>后续不同产品线可按需要复用或扩展流程</p>
            </div>
          </div>
          <div id="template-list" class="template-list"></div>
        </div>
      </section>

      <section id="resources-view" class="view">
        <div class="tabs">
          <button class="tab active" data-tab="users">用户管理</button>
          <button class="tab" data-tab="departments">部门管理</button>
          <button class="tab" data-tab="roles">角色管理</button>
          <button class="tab" data-tab="permissions">权限管理</button>
          <button class="tab" data-tab="customer-statuses">客户项目状态配置</button>
          <button class="tab" data-tab="customer-levels">客户等级配置</button>
          <button class="tab" data-tab="order-types">订单类型配置</button>
          <button class="tab" data-tab="task-statuses">任务状态配置</button>
        </div>
        <div id="resource-content" class="panel org-panel"></div>
      </section>
    </main>
  </div>

  <div id="global-modal-root"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./api.js"></script>
  <script src="./app.js"></script>
</body>
</html>
